<!DOCTYPE html>

<head>

  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#07111f;color:#f7fbff}*{box-sizing:border-box}body{margin:0;min-height:100vh;overflow:hidden;background:radial-gradient(circle at 20% 8%,rgba(79,179,255,.25),transparent 26rem),radial-gradient(circle at 85% 12%,rgba(255,122,47,.2),transparent 24rem),linear-gradient(135deg,#07111f,#111d31 60%,#07111f)}#gameShell{width:100vw;height:100vh;display:grid;grid-template-rows:auto 1fr auto}header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;padding:.75rem 1rem;background:rgba(2,8,18,.78);border-bottom:1px solid rgba(255,255,255,.12);box-shadow:0 1rem 2rem rgba(0,0,0,.26);backdrop-filter:blur(10px)}.brand{font-weight:900;letter-spacing:.08em;text-transform:uppercase}.brand span,#shotFeedback h2{color:#ffba4a}#scoreboard{display:flex;align-items:stretch;gap:.5rem;font-variant-numeric:tabular-nums}.scoreCard{min-width:9rem;padding:.45rem .8rem;border-radius:.75rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);text-align:center}.scoreCard strong{display:block;font-size:1.45rem;line-height:1}.clockCard{min-width:8rem;padding:.45rem .8rem;border-radius:.75rem;background:#f7fbff;color:#09111f;text-align:center;font-weight:900}.hudRight{text-align:right;color:#b8c7d9;font-size:.9rem}.meter{display:inline-grid;grid-template-columns:repeat(8,.45rem);gap:.08rem;margin-left:.35rem;vertical-align:middle}.meter i{display:block;height:.45rem;border-radius:999px;background:rgba(255,255,255,.16)}.meter i.on{background:#ffba4a}#canvasWrap{position:relative;min-height:0}canvas{width:100%;height:100%;display:block;touch-action:none}#message{position:absolute;left:50%;top:1rem;transform:translateX(-50%);min-width:min(36rem,calc(100vw - 2rem));padding:.7rem 1rem;border-radius:999px;text-align:center;background:rgba(2,8,18,.72);border:1px solid rgba(255,255,255,.13);box-shadow:0 .75rem 1.5rem rgba(0,0,0,.22);pointer-events:none;z-index:4}#shotFeedback{position:absolute;right:1rem;top:4.6rem;width:min(21rem,calc(100vw - 2rem));padding:.85rem;border-radius:1rem;background:rgba(2,8,18,.76);border:1px solid rgba(255,255,255,.14);box-shadow:0 1rem 2rem rgba(0,0,0,.24);backdrop-filter:blur(10px);z-index:3}#shotFeedback h2{margin:0 0 .5rem;font-size:.82rem;letter-spacing:.12em;text-transform:uppercase}.feedbackGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem;font-size:.78rem}.feedbackStat{padding:.45rem .55rem;border-radius:.7rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}.feedbackStat strong{display:block;font-size:1rem;color:#fff}.bar{height:.45rem;margin-top:.6rem;border-radius:999px;background:rgba(255,255,255,.13);overflow:hidden}.bar span{display:block;height:100%;width:var(--make,0%);background:#ffba4a}footer{display:flex;flex-wrap:wrap;gap:.5rem 1rem;align-items:center;justify-content:center;padding:.65rem 1rem;background:rgba(2,8,18,.78);border-top:1px solid rgba(255,255,255,.1);color:#b8c7d9;font-size:.85rem}kbd{border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);border-radius:.35rem;padding:.1rem .35rem;color:#fff;font-weight:700}#touchControls{position:fixed;inset:auto 0 0 0;display:none;justify-content:space-between;align-items:end;gap:1rem;padding:0 1rem 4.25rem;pointer-events:none;z-index:5}.touchPad,.touchActions{pointer-events:auto;display:grid;gap:.45rem;padding:.55rem;border-radius:1.2rem;background:rgba(2,8,18,.58);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(10px);box-shadow:0 1rem 2rem rgba(0,0,0,.26);user-select:none;-webkit-user-select:none}.touchPad{grid-template-columns:repeat(3,3.1rem);grid-template-rows:repeat(3,3.1rem);grid-template-areas:'. up .' 'left sprint right' '. down .'}.touchActions{grid-template-columns:repeat(2,4.05rem)}.touchPad button,.touchActions button{min-width:3.1rem;min-height:3.1rem;border:1px solid rgba(255,255,255,.18);border-radius:.95rem;color:#f7fbff;background:rgba(255,255,255,.12);font:900 .72rem/1 system-ui;letter-spacing:.03em;text-transform:uppercase;touch-action:none}.touchPad button:active,.touchActions button:active,.touchPad button.active,.touchActions button.active{background:#ffba4a;color:#07111f;transform:translateY(1px) scale(.98)}.touchPad [data-hold='w']{grid-area:up}.touchPad [data-hold='a']{grid-area:left}.touchPad [data-hold='d']{grid-area:right}.touchPad [data-hold='s']{grid-area:down}.touchPad [data-hold='shift']{grid-area:sprint}@media(max-width:780px){header{grid-template-columns:1fr;text-align:center;gap:.45rem;padding:.5rem .6rem}.hudRight{text-align:center;font-size:.78rem}#scoreboard{justify-content:center}.scoreCard{min-width:6.5rem;padding:.35rem .5rem}.clockCard{min-width:6.6rem;padding:.35rem .5rem}.brand{font-size:.86rem}#message{top:.4rem;font-size:.82rem}#shotFeedback{left:.5rem;right:.5rem;top:auto;bottom:5.3rem;width:auto;padding:.6rem}.feedbackGrid{grid-template-columns:repeat(4,1fr);gap:.25rem;font-size:.66rem}.feedbackStat{padding:.32rem}.feedbackStat strong{font-size:.78rem}footer{font-size:.72rem;padding-bottom:.5rem}}@media(pointer:coarse),(max-width:720px){#touchControls{display:flex}footer{padding-bottom:4.85rem}}@media(max-width:520px){#touchControls{gap:.35rem;padding-inline:.45rem}.touchPad{grid-template-columns:repeat(3,2.75rem);grid-template-rows:repeat(3,2.75rem)}.touchActions{grid-template-columns:repeat(2,3.6rem)}.touchPad button,.touchActions button{min-width:2.75rem;min-height:2.75rem;font-size:.62rem;border-radius:.8rem}}
  </style>

<body>
  <div id='gameShell'>
    <header><div class='brand'>GT <span>Sports</span> Basketball <small>v004</small></div><div id='scoreboard' data-testid='scoreboard'></div><div class='hudRight' id='playerPanel'>Loading roster...</div></header>
    <main id='canvasWrap'><canvas id='gameCanvas' data-testid='game-canvas' width='1280' height='720' aria-label='Gametime Basketball playable court'></canvas><div id='message'>v004 focus: shot feedback with release quality, contest, distance, and make chance.</div><aside id='shotFeedback' data-testid='shot-feedback' aria-live='polite'><h2>Shot Feedback</h2><div class='feedbackGrid'><div class='feedbackStat'>Release<strong>Ready</strong></div><div class='feedbackStat'>Contest<strong>None</strong></div><div class='feedbackStat'>Distance<strong>--</strong></div><div class='feedbackStat'>Make Chance<strong>--</strong></div></div><div class='bar' style='--make:0%'><span></span></div></aside></main>
    <footer><span><kbd>WASD</kbd>/<kbd>Arrows</kbd> move</span><span><kbd>Shift</kbd> sprint</span><span><kbd>Space</kbd> pass</span><span><kbd>J</kbd> shoot</span><span><kbd>Tab</kbd> switch player</span><span><kbd>C</kbd> camera</span><span><kbd>R</kbd> reset</span><span>Mobile: touch controls</span></footer>
  </div>
  <div id='touchControls' data-testid='touch-controls' aria-label='Mobile touch controls'><div class='touchPad' aria-label='Movement pad'><button type='button' data-hold='w' aria-label='Move up'>▲</button><button type='button' data-hold='a' aria-label='Move left'>◀</button><button type='button' data-hold='shift' aria-label='Sprint'>Run</button><button type='button' data-hold='d' aria-label='Move right'>▶</button><button type='button' data-hold='s' aria-label='Move down'>▼</button></div><div class='touchActions' aria-label='Action buttons'><button type='button' data-action='switch'>Switch</button><button type='button' data-action='camera'>Cam</button><button type='button' data-action='pass'>Pass</button><button type='button' data-action='shoot'>Shoot</button></div></div>
  <script>
    (()=>{
      window.__gametimeVersion='v004';
      const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),scoreboard=document.getElementById('scoreboard'),playerPanel=document.getElementById('playerPanel'),message=document.getElementById('message'),touchControls=document.getElementById('touchControls'),shotFeedbackPanel=document.getElementById('shotFeedback');
      const COURT={w:940,h:500},hoop=[{x:42,y:250},{x:898,y:250}],cameras=['Full Court','Broadcast','Player Follow','Half Court'],leagueTeams=['Denver Peaks','Canyon Comets','Metro Meteors','Bay City Breakers','Desert Sparks','Harbor Knights','Prairie Cyclones','Summit Owls'];
      const teams=[{id:'DEN',city:'Denver',name:'Peaks',color:'#4fb3ff',trim:'#fff1c8',score:0,players:[['Jace Altitude','PG',88,84,91,77,72],['Milo Frost','SG',82,89,78,73,69],['Trey Skyline','SF',80,81,78,80,75],['Cal Timber','PF',73,74,70,86,86],['Bram Summit','C',62,68,63,90,94]]},{id:'CYN',city:'Canyon',name:'Comets',color:'#ff7a2f',trim:'#fff1e7',score:0,players:[['Nico Vale','PG',86,82,88,79,70],['Dash Mercer','SG',84,87,76,72,68],['Leo Summit','SF',79,80,80,82,77],['Otis Ridge','PF',71,75,68,87,88],['Hank Stone','C',59,66,61,91,95]]}];
      let players=[],possessionTeam=0,ballHandler=null,controlledTeam=0,controlledIndex=0,cameraIndex=0,lastTime=performance.now(),gameOver=false,gameClock=180,shotClock=24,possessionCooldown=0,lastShot=null;
      let ball={x:470,y:250,vx:0,vy:0,target:null,airborne:0,bounce:0};
      const keys=new Set(),virtualKeys=new Set();
      const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
      const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
      const attackingHoop=team=>hoop[team===0?1:0];
      const defendingHoop=team=>hoop[team===0?0:1];
      const isPressed=key=>keys.has(key)||virtualKeys.has(key);
      const controlledPlayer=()=>players.find(p=>p.team===controlledTeam&&p.index===controlledIndex)||players[0];
      function resizeCanvas(){const ratio=window.devicePixelRatio||1;canvas.width=Math.floor(canvas.clientWidth*ratio);canvas.height=Math.floor(canvas.clientHeight*ratio);ctx.setTransform(ratio,0,0,ratio,0,0)}
      function flash(text){message.textContent=text;message.animate([{opacity:0,transform:'translateX(-50%) translateY(-.4rem)'},{opacity:1,transform:'translateX(-50%) translateY(0)'}],{duration:180,fill:'forwards'})}
      function makePlayers(){players=[];teams.forEach((team,ti)=>team.players.forEach((raw,pi)=>{const[name,pos,speed,shoot,pass,defense,rebound]=raw;players.push({id:`${team.id}-${pi}`,team:ti,index:pi,name,pos,speed,shoot,pass,defense,rebound,x:470+(ti===0?-120:120)+(pi-2)*12,y:250+(pi-2)*48,tx:470,ty:250,vx:0,vy:0,facing:ti===0?1:-1,stride:0,radius:pos==='C'?13:pos==='PF'?12:11,energy:100,hasBall:false})}))}
      function resetPossession(teamIndex,reason=''){possessionTeam=teamIndex;shotClock=24;possessionCooldown=.35;players.forEach(p=>{p.hasBall=false;p.vx*=.25;p.vy*=.25});const pg=players.find(p=>p.team===possessionTeam&&p.pos==='PG');ballHandler=pg;pg.hasBall=true;ball.x=pg.x;ball.y=pg.y;ball.target=null;ball.airborne=0;const dir=possessionTeam===0?1:-1;players.forEach(p=>{const lane=p.index-2;p.x=p.team===possessionTeam?470-dir*250+dir*p.index*18:470+dir*120;p.y=250+lane*54;p.facing=p.team===0?1:-1});if(reason)flash(reason)}
      function switchPlayer(){const teamPlayers=players.filter(p=>p.team===controlledTeam),withBall=teamPlayers.find(p=>p.hasBall);controlledIndex=withBall&&withBall.index!==controlledIndex?withBall.index:(controlledIndex+1)%5;flash(`Controlling ${controlledPlayer().name} (${controlledPlayer().pos})`)}
      function passBall(from,to){if(!from||!to||from.team!==to.team||from===to)return;from.hasBall=false;ballHandler=null;ball.target=to;ball.airborne=.38;ball.vx=(to.x-ball.x)/ball.airborne;ball.vy=(to.y-ball.y)/ball.airborne;flash(`${from.name} zips it to ${to.name}`)}
      function bestPassTarget(from){const rim=attackingHoop(from.team);return players.filter(p=>p.team===from.team&&p!==from).sort((a,b)=>(dist(a,rim)-a.shoot*.75)-(dist(b,rim)-b.shoot*.75))[0]}
      function attemptPass(){const cp=controlledPlayer(),passer=cp.hasBall?cp:players.find(p=>p.team===cp.team&&p.hasBall);passBall(passer,cp.hasBall?bestPassTarget(cp):cp)}
      const shotGrade=v=>v>=82?'A':v>=70?'B':v>=56?'C':v>=42?'D':'F';
      const contestLabel=d=>d<32?'Smothered':d<52?'Heavy':d<78?'Light':'Open';
      function calculateShot(shooter){const rim=attackingHoop(shooter.team),distance=dist(shooter,rim),three=shooter.team===0?shooter.x<730:shooter.x>210,nearest=players.filter(p=>p.team!==shooter.team).reduce((best,p)=>Math.min(best,dist(p,shooter)),999),speed=Math.hypot(shooter.vx,shooter.vy),closeBonus=distance<90?.25:0,contestPenalty=nearest<32?.26:nearest<52?.18:nearest<78?.08:0,movementPenalty=clamp(speed/780,0,.12),releaseQuality=clamp(58+(shooter.shoot-75)*.7-movementPenalty*130+(Math.random()-.5)*28,1,99),releaseBonus=(releaseQuality-55)/210,chance=clamp(.60-distance/540+(shooter.shoot-75)/190+closeBonus+releaseBonus-contestPenalty-movementPenalty,.08,.90);return{rim,distance,three,nearest,contest:contestLabel(nearest),releaseQuality,grade:shotGrade(releaseQuality),chance}}
      function updateShotFeedback(info,outcome='Pending'){lastShot={...info,outcome};const pct=Math.round(info.chance*100);shotFeedbackPanel.style.setProperty('--make',`${pct}%`);shotFeedbackPanel.innerHTML=`<h2>Shot Feedback</h2><div class='feedbackGrid'><div class='feedbackStat'>Release<strong>${info.grade} ${Math.round(info.releaseQuality)}%</strong></div><div class='feedbackStat'>Contest<strong>${info.contest}</strong></div><div class='feedbackStat'>Distance<strong>${Math.round(info.distance)} px</strong></div><div class='feedbackStat'>Make Chance<strong>${pct}%</strong></div></div><div class='bar' style='--make:${pct}%'><span></span></div><div style='margin-top:.5rem;color:#b8c7d9;font-size:.76rem'>${outcome} · ${info.three?'3PT attempt':'2PT attempt'}</div>`}
      function shootBall(shooter){if(!shooter||!shooter.hasBall||possessionCooldown>0)return;const info=calculateShot(shooter),made=Math.random()<info.chance;updateShotFeedback(info,made?'Good look — shot is up':'Shot is up');shooter.hasBall=false;ballHandler=null;ball.target=null;ball.x=shooter.x;ball.y=shooter.y;ball.airborne=.65;ball.vx=(info.rim.x-ball.x)/ball.airborne;ball.vy=(info.rim.y-ball.y)/ball.airborne;flash(`${shooter.name}: ${info.grade} release, ${info.contest.toLowerCase()} contest, ${Math.round(info.chance*100)}% make chance`);setTimeout(()=>{const pts=info.three?3:2;if(made){teams[shooter.team].score+=pts;updateShotFeedback(info,`Made ${pts}`);flash(`${shooter.name} scores ${pts}! ${info.grade} release held up.`);resetPossession(1-shooter.team)}else{updateShotFeedback(info,'Missed');flash(`${shooter.name} misses. Rebound battle!`);rebound(shooter.team)}},520)}
      function rebound(shootingTeam){const rim=attackingHoop(shootingTeam),board=players.slice().sort((a,b)=>(dist(a,rim)-a.rebound*1.1+Math.random()*80)-(dist(b,rim)-b.rebound*1.1+Math.random()*80))[0];possessionTeam=board.team;shotClock=board.team===shootingTeam?14:24;possessionCooldown=.2;players.forEach(p=>p.hasBall=false);board.hasBall=true;ballHandler=board;ball.x=board.x;ball.y=board.y;ball.airborne=0;flash(`${board.name} grabs the rebound`)}
      function moveWithMomentum(p,ax,ay,dt,userControlled=false){const hasInput=Math.abs(ax)+Math.abs(ay)>0,sprinting=userControlled&&isPressed('shift')&&p.energy>24&&hasInput,energyFactor=clamp(p.energy/100,.42,1),topSpeed=(125+p.speed*1.7)*(sprinting?1.18:1)*energyFactor,acceleration=(760+p.speed*5.5)*(sprinting?1.12:1),friction=hasInput?.88:.80;if(hasInput){const mag=Math.hypot(ax,ay)||1;p.vx+=ax/mag*acceleration*dt;p.vy+=ay/mag*acceleration*dt;p.facing=ax<-.05?-1:ax>.05?1:p.facing;p.energy=clamp(p.energy-(sprinting?13:4.5)*dt,18,100)}else p.energy=clamp(p.energy+8*dt,18,100);const speed=Math.hypot(p.vx,p.vy);if(speed>topSpeed){p.vx=p.vx/speed*topSpeed;p.vy=p.vy/speed*topSpeed}p.vx*=Math.pow(friction,dt*60);p.vy*=Math.pow(friction,dt*60);p.x=clamp(p.x+p.vx*dt,22,918);p.y=clamp(p.y+p.vy*dt,34,466);if(p.x<=22||p.x>=918)p.vx*=-.25;if(p.y<=34||p.y>=466)p.vy*=-.25;p.stride+=Math.hypot(p.vx,p.vy)*dt*.045}
      function handleInput(dt){const p=controlledPlayer();let dx=0,dy=0;if(isPressed('arrowleft')||isPressed('a'))dx--;if(isPressed('arrowright')||isPressed('d'))dx++;if(isPressed('arrowup')||isPressed('w'))dy--;if(isPressed('arrowdown')||isPressed('s'))dy++;moveWithMomentum(p,dx,dy,dt,true)}
      function offensiveSpot(p){const dir=p.team===0?1:-1,baseX=p.index===0?.43:p.index===4?.78:.62,x=dir===1?COURT.w*baseX:COURT.w*(1-baseX),lanes=[0,-120,118,-54,54];return{x,y:250+lanes[p.index]}}
      function updateAI(dt){const cp=controlledPlayer(),rim=attackingHoop(possessionTeam);players.forEach(p=>{if(p===cp)return;if(p.team===possessionTeam){if(p.hasBall){const dir=p.team===0?1:-1;p.tx=clamp(p.x+dir*90,60,880);p.ty=clamp(p.y+(rim.y-p.y)*.45,60,440);const d=dist(p,rim);if(possessionCooldown<=0&&(d<105||shotClock<6||Math.random()<.004))shootBall(p);else if(Math.random()<.006)passBall(p,bestPassTarget(p))}else{const s=offensiveSpot(p);p.tx=s.x;p.ty=s.y}}else{const mark=players.filter(o=>o.team!==p.team).sort((a,b)=>dist(a,p)-dist(b,p))[0]||ballHandler,home=defendingHoop(p.team);p.tx=mark?mark.x*.82+home.x*.18:home.x+(p.index-2)*28;p.ty=mark?mark.y*.86+home.y*.14:home.y+(p.index-2)*40}moveWithMomentum(p,p.tx-p.x,p.ty-p.y,dt,false)})}
      function updateBall(dt){ball.bounce+=dt*(ballHandler?10+Math.hypot(ballHandler.vx,ballHandler.vy)/28:6);if(ballHandler){const speed=Math.hypot(ballHandler.vx,ballHandler.vy),lateral=ballHandler.facing*clamp(speed/95,.15,1)*8,dribbleDrop=Math.abs(Math.sin(ball.bounce))*(8+clamp(speed/32,0,10));ball.x+=(ballHandler.x+lateral-ball.x)*.52;ball.y+=(ballHandler.y-14+dribbleDrop-ball.y)*.52}else if(ball.target){ball.airborne-=dt;ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;if(ball.airborne<=0){const target=ball.target;ball.target=null;target.hasBall=true;ballHandler=target;ball.x=target.x;ball.y=target.y}}else if(ball.airborne>0){ball.airborne-=dt;ball.x+=ball.vx*dt;ball.y+=ball.vy*dt}}
      function checkSteals(){if(!ballHandler||possessionCooldown>0)return;players.filter(p=>p.team!==ballHandler.team).forEach(d=>{const pressure=dist(d,ballHandler),handlerSpeed=Math.hypot(ballHandler.vx,ballHandler.vy),riskyDribble=handlerSpeed>170?1.35:1;if(pressure<24&&Math.random()<(d.defense/10000)*riskyDribble){ballHandler.hasBall=false;d.hasBall=true;possessionTeam=d.team;ballHandler=d;shotClock=24;possessionCooldown=.25;flash(`${d.name} pokes it loose!`)}})}
      function updateClock(dt){if(gameOver)return;gameClock-=dt;shotClock-=dt;possessionCooldown=Math.max(0,possessionCooldown-dt);if(shotClock<=0)resetPossession(1-possessionTeam,'Shot clock violation');if(gameClock<=0){gameClock=0;gameOver=true;const result=teams[0].score===teams[1].score?'Tie game. Run it back?':`${teams[teams[0].score>teams[1].score?0:1].city} wins the short run!`;flash(`Final: ${teams[0].score}-${teams[1].score}. ${result}`)}}
      function roundRect(x,y,w,h,r,fill,stroke){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);if(fill)ctx.fill();if(stroke)ctx.stroke()}
      function drawCourt(){ctx.fillStyle='#c98a45';roundRect(0,0,940,500,18,true,false);ctx.strokeStyle='rgba(255,255,255,.82)';ctx.lineWidth=3;ctx.strokeRect(28,28,884,444);ctx.beginPath();ctx.moveTo(470,28);ctx.lineTo(470,472);ctx.stroke();ctx.beginPath();ctx.arc(470,250,62,0,Math.PI*2);ctx.stroke();hoop.forEach((h,i)=>{ctx.strokeStyle='rgba(255,255,255,.82)';ctx.strokeRect(i===0?28:792,170,120,160);ctx.beginPath();ctx.arc(h.x,h.y,14,0,Math.PI*2);ctx.strokeStyle='#ffefe0';ctx.stroke();ctx.beginPath();ctx.arc(h.x,h.y,118,-Math.PI/2,Math.PI/2,i===0);ctx.strokeStyle='rgba(255,255,255,.55)';ctx.stroke()});ctx.fillStyle='rgba(4,12,22,.14)';ctx.fillRect(378,220,184,60);ctx.fillStyle='rgba(255,255,255,.24)';ctx.font='900 20px system-ui';ctx.textAlign='center';ctx.fillText('DENVER PEAKS',470,246);ctx.font='800 11px system-ui';ctx.fillText(`LEAGUE: ${leagueTeams.length} FICTIONAL CLUBS`,470,267)}
      function drawPlayers(){const cp=controlledPlayer();players.forEach(p=>{ctx.beginPath();ctx.fillStyle='rgba(0,0,0,.22)';ctx.ellipse(p.x,p.y+p.radius+3,p.radius*1.25,4,0,0,Math.PI*2);ctx.fill()});players.forEach(p=>{const leanX=clamp(p.vx/120,-3,3),leanY=clamp(p.vy/120,-3,3);ctx.beginPath();ctx.fillStyle=p===cp?'#fff9a8':teams[p.team].color;ctx.strokeStyle=p.hasBall?'#fff':teams[p.team].trim;ctx.lineWidth=p.hasBall?4:2;ctx.arc(p.x+leanX,p.y+leanY,p.radius,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2;const foot=Math.sin(p.stride)*3;ctx.beginPath();ctx.moveTo(p.x-5,p.y+p.radius+2+foot);ctx.lineTo(p.x-1,p.y+p.radius+5+foot);ctx.moveTo(p.x+5,p.y+p.radius+2-foot);ctx.lineTo(p.x+1,p.y+p.radius+5-foot);ctx.stroke();ctx.fillStyle=p===cp?'#061020':'#fff';ctx.font='800 9px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.pos,p.x+leanX,p.y+leanY);ctx.fillStyle='rgba(255,255,255,.86)';ctx.font='700 10px system-ui';ctx.fillText(p.name.split(' ')[0],p.x,p.y+24)})}
      function drawBall(){ctx.beginPath();ctx.fillStyle='#ff8f2f';ctx.strokeStyle='#4d1f08';ctx.lineWidth=1.5;ctx.arc(ball.x,ball.y,7+Math.max(0,ball.airborne)*7,0,Math.PI*2);ctx.fill();ctx.stroke();if(ballHandler){ctx.strokeStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.ellipse(ball.x,ball.y+7,7,2.5,0,0,Math.PI*2);ctx.stroke()}}
      function drawShotArc(){if(!lastShot||ballHandler||ball.airborne<=0)return;ctx.save();ctx.strokeStyle=lastShot.outcome&&lastShot.outcome.startsWith('Made')?'rgba(120,255,160,.75)':'rgba(255,186,74,.65)';ctx.lineWidth=2;ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(ball.x,ball.y);ctx.lineTo(lastShot.rim.x,lastShot.rim.y);ctx.stroke();ctx.restore()}
      function applyCamera(){const w=canvas.clientWidth,h=canvas.clientHeight,cp=controlledPlayer();let view={x:0,y:0,w:940,h:500};if(cameraIndex===1)view={x:0,y:50,w:940,h:400};if(cameraIndex===2)view={x:clamp(cp.x-235,0,470),y:clamp(cp.y-135,0,230),w:470,h:270};if(cameraIndex===3){const bx=ballHandler?ballHandler.x:ball.x;view={x:bx<470?0:470,y:0,w:470,h:500}}const scale=Math.min(w/view.w,h/view.h),ox=(w-view.w*scale)/2-view.x*scale,oy=(h-view.h*scale)/2-view.y*scale;ctx.setTransform(scale,0,0,scale,ox,oy)}
      function render(){ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);ctx.fillStyle='#07111f';ctx.fillRect(0,0,canvas.clientWidth,canvas.clientHeight);applyCamera();drawCourt();drawPlayers();drawShotArc();drawBall()}
      function energyMeter(value){const lit=Math.round(clamp(value,0,100)/12.5);return`<span class='meter' aria-label='Energy ${Math.round(value)}'>${Array.from({length:8},(_,i)=>`<i class='${i<lit?'on':''}'></i>`).join('')}</span>`}
      function updateHUD(){const min=Math.floor(gameClock/60),sec=Math.floor(gameClock%60).toString().padStart(2,'0');scoreboard.innerHTML=`<div class='scoreCard'><small>${teams[0].city} ${teams[0].name}</small><strong>${teams[0].score}</strong></div><div class='clockCard'><div>${min}:${sec}</div><small>SHOT ${Math.ceil(shotClock)}</small></div><div class='scoreCard'><small>${teams[1].city} ${teams[1].name}</small><strong>${teams[1].score}</strong></div>`;const cp=controlledPlayer(),speed=Math.round(Math.hypot(cp.vx,cp.vy));playerPanel.innerHTML=`${cameras[cameraIndex]} | ${cp.name} ${cp.pos} | Speed ${speed} | Energy ${energyMeter(cp.energy)} | ${ballHandler?ballHandler.name+' ball':'ball in air'}`}
      function loop(now){const dt=Math.min(.033,(now-lastTime)/1000);lastTime=now;if(!gameOver){handleInput(dt);updateAI(dt);updateBall(dt);checkSteals();updateClock(dt)}render();updateHUD();requestAnimationFrame(loop)}
      function resetGame(){teams.forEach(t=>t.score=0);gameClock=180;gameOver=false;lastShot=null;shotFeedbackPanel.style.setProperty('--make','0%');shotFeedbackPanel.innerHTML=`<h2>Shot Feedback</h2><div class='feedbackGrid'><div class='feedbackStat'>Release<strong>Ready</strong></div><div class='feedbackStat'>Contest<strong>None</strong></div><div class='feedbackStat'>Distance<strong>--</strong></div><div class='feedbackStat'>Make Chance<strong>--</strong></div></div><div class='bar' style='--make:0%'><span></span></div>`;makePlayers();resetPossession(0,'Gametime v004: shot feedback is live')}
      function changeCamera(){cameraIndex=(cameraIndex+1)%cameras.length;flash(`Camera: ${cameras[cameraIndex]}`)}
      window.addEventListener('keydown',e=>{const key=e.key.toLowerCase();if([' ','tab','arrowup','arrowdown','arrowleft','arrowright'].includes(key))e.preventDefault();keys.add(key);if(key==='tab')switchPlayer();if(key==='c')changeCamera();if(key==='r')resetGame();if(key==='j')shootBall(controlledPlayer());if(key===' ')attemptPass()});
      window.addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));window.addEventListener('blur',()=>{keys.clear();virtualKeys.clear()});
      touchControls.addEventListener('pointerdown',e=>{const button=e.target.closest('button');if(!button)return;e.preventDefault();button.setPointerCapture?.(e.pointerId);const hold=button.dataset.hold;if(hold){virtualKeys.add(hold);button.classList.add('active');return}const action=button.dataset.action;if(action==='switch')switchPlayer();if(action==='camera')changeCamera();if(action==='pass')attemptPass();if(action==='shoot')shootBall(controlledPlayer())});
      ['pointerup','pointercancel','pointerleave'].forEach(type=>touchControls.addEventListener(type,e=>{const button=e.target.closest('button');if(!button||!button.dataset.hold)return;virtualKeys.delete(button.dataset.hold);button.classList.remove('active')}));
      window.addEventListener('resize',resizeCanvas);resizeCanvas();resetGame();requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
